# EYE Agência — nginx: serve o SPA + proxy /api para o backend.
# (TLS/HTTPS é terminado pela camada de borda — ver eye-deploy/DEPLOY.md.
#  Em VPS, use Caddy (HTTPS automático) ou Certbot na frente deste container.)

gzip on;
gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
gzip_min_length 1024;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Headers de segurança
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # HSTS — ative quando o HTTPS estiver no ar (ver DEPLOY.md)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'" always;

  # Assets com hash → cache longo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API → backend (Fastify). O serviço no compose chama-se "api".
  location /api/ {
    proxy_pass http://api:3333;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 30m;
  }

  # Uploads servidos pelo backend
  location /uploads/ {
    proxy_pass http://api:3333;
    proxy_set_header Host $host;
  }

  # SPA — qualquer outra rota cai no index.html (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
